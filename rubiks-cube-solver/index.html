<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rubik's Cube Solver</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Rubik's Cube Solver</h1>
        <p class="subtitle">Interactive 2D Solver & State Editor</p>
      </header>

      <div id="cube-container">
        <div id="cube-layout">
          <!-- Up face (U) -->
          <div class="face face-u" data-face="U" title="Up (Top) - White Center">
            <div class="sticker" data-index="0"></div>
            <div class="sticker" data-index="1"></div>
            <div class="sticker" data-index="2"></div>
            <div class="sticker" data-index="3"></div>
            <div class="sticker" data-index="4"></div>
            <div class="sticker" data-index="5"></div>
            <div class="sticker" data-index="6"></div>
            <div class="sticker" data-index="7"></div>
            <div class="sticker" data-index="8"></div>
          </div>

          <!-- Left face (L) -->
          <div class="face face-l" data-face="L" title="Left - Orange Center">
            <div class="sticker" data-index="36"></div>
            <div class="sticker" data-index="37"></div>
            <div class="sticker" data-index="38"></div>
            <div class="sticker" data-index="39"></div>
            <div class="sticker" data-index="40"></div>
            <div class="sticker" data-index="41"></div>
            <div class="sticker" data-index="42"></div>
            <div class="sticker" data-index="43"></div>
            <div class="sticker" data-index="44"></div>
          </div>

          <!-- Front face (F) -->
          <div class="face face-f" data-face="F" title="Front - Green Center">
            <div class="sticker" data-index="18"></div>
            <div class="sticker" data-index="19"></div>
            <div class="sticker" data-index="20"></div>
            <div class="sticker" data-index="21"></div>
            <div class="sticker" data-index="22"></div>
            <div class="sticker" data-index="23"></div>
            <div class="sticker" data-index="24"></div>
            <div class="sticker" data-index="25"></div>
            <div class="sticker" data-index="26"></div>
          </div>

          <!-- Right face (R) -->
          <div class="face face-r" data-face="R" title="Right - Red Center">
            <div class="sticker" data-index="9"></div>
            <div class="sticker" data-index="10"></div>
            <div class="sticker" data-index="11"></div>
            <div class="sticker" data-index="12"></div>
            <div class="sticker" data-index="13"></div>
            <div class="sticker" data-index="14"></div>
            <div class="sticker" data-index="15"></div>
            <div class="sticker" data-index="16"></div>
            <div class="sticker" data-index="17"></div>
          </div>

          <!-- Down face (D) -->
          <div class="face face-d" data-face="D" title="Down (Bottom) - Yellow Center">
            <div class="sticker" data-index="27"></div>
            <div class="sticker" data-index="28"></div>
            <div class="sticker" data-index="29"></div>
            <div class="sticker" data-index="30"></div>
            <div class="sticker" data-index="31"></div>
            <div class="sticker" data-index="32"></div>
            <div class="sticker" data-index="33"></div>
            <div class="sticker" data-index="34"></div>
            <div class="sticker" data-index="35"></div>
          </div>

          <!-- Back face (B) -->
          <div class="face face-b" data-face="B" title="Back - Blue Center">
            <div class="sticker" data-index="45"></div>
            <div class="sticker" data-index="46"></div>
            <div class="sticker" data-index="47"></div>
            <div class="sticker" data-index="48"></div>
            <div class="sticker" data-index="49"></div>
            <div class="sticker" data-index="50"></div>
            <div class="sticker" data-index="51"></div>
            <div class="sticker" data-index="52"></div>
            <div class="sticker" data-index="53"></div>
          </div>
        </div>
      </div>

      <div id="status-container" class="status-container">
        <div id="status-message" class="status-message status-ready">Ready to paint, scramble, or solve.</div>
        <div id="solution-display" class="solution-display hidden">
          <span class="solution-label">Solution:</span>
          <div id="moves-container" class="moves-container"></div>
        </div>
      </div>

      <div id="controls">
        <div class="control-panel">
          <div class="palette-container">
            <span class="control-label">Paint Color:</span>
            <div class="palette">
              <button class="palette-btn active" data-color="W" title="White" aria-label="White"></button>
              <button class="palette-btn" data-color="Y" title="Yellow" aria-label="Yellow"></button>
              <button class="palette-btn" data-color="G" title="Green" aria-label="Green"></button>
              <button class="palette-btn" data-color="B" title="Blue" aria-label="Blue"></button>
              <button class="palette-btn" data-color="O" title="Orange" aria-label="Orange"></button>
              <button class="palette-btn" data-color="R" title="Red" aria-label="Red"></button>
            </div>
          </div>
          <div class="action-buttons">
            <button id="scramble-btn" class="btn btn-warning">Scramble Cube</button>
            <button id="solve-btn" class="btn btn-primary">Solve Cube</button>
            <button id="reset-btn" class="btn btn-secondary">Reset to Solved</button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
