<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Buddy — Settings</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #34d399;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select,
    input[type="password"] {
      width: 100%;
      padding: 0.625rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9375rem;
      margin-bottom: 1.25rem;
    }

    select:focus,
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    }

    .hint {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: -0.75rem;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: var(--accent-hover);
    }

    #status {
      margin-top: 1rem;
      font-size: 0.875rem;
      text-align: center;
      min-height: 1.25rem;
    }

    #status.success {
      color: var(--success);
    }

    #status.error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DSA Buddy Settings</h1>
    <p class="subtitle">Choose your active provider and save your API keys. Keys are stored locally in your browser only.</p>

    <form id="settings-form">
      <label for="provider">LLM Provider</label>
      <select id="provider" name="provider">
        <option value="gemini">Google Gemini</option>
        <option value="groq">Groq</option>
      </select>

      <label for="gemini-key">Google Gemini API Key</label>
      <input
        type="password"
        id="gemini-key"
        name="geminiKey"
        placeholder="AIza..."
        autocomplete="off"
      />

      <label for="groq-key">Groq API Key</label>
      <input
        type="password"
        id="groq-key"
        name="groqKey"
        placeholder="gsk_..."
        autocomplete="off"
      />
      <p class="hint">
        Both keys can be saved at once. The selected provider above is used for chat. Keys are only sent to that provider's API from the background service worker.
      </p>

      <button type="submit">Save Settings</button>
    </form>

    <p id="status" role="status" aria-live="polite"></p>
  </div>

  <script src="options.js"></script>
</body>
</html>
